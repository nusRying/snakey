<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snakey Logo Export</title>
    <style>
      html,
      body {
        margin: 0;
        width: 512px;
        height: 512px;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      img {
        display: block;
        width: 512px;
        height: 512px;
      }
    </style>
  </head>
  <body>
    <img src="./snakey-logo.svg" alt="Snakey IO logo" />
  </body>
</html>
