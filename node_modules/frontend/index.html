<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/snakey-logo.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Snakey IO</title>
  </head>
  <body>
    <div
      id="error-log"
      style="
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        color: red;
        background: black;
        font-family: monospace;
        white-space: pre-wrap;
        padding: 10px;
      "
    ></div>
    <script>
      window.__SNAKEY_CONFIG__ = {
        backendUrl: '%VITE_BACKEND_URL%',
        firebaseMeasurementId: '%VITE_FIREBASE_MEASUREMENT_ID%',
        admobAppIdAndroid: '%VITE_ADMOB_APP_ID_ANDROID%',
        admobBannerIdAndroid: '%VITE_ADMOB_BANNER_ID_ANDROID%',
        admobInterstitialIdAndroid: '%VITE_ADMOB_INTERSTITIAL_ID_ANDROID%',
        admobRewardedIdAndroid: '%VITE_ADMOB_REWARDED_ID_ANDROID%',
      };

      window.onerror = function (msg, url, lineNo, columnNo, error) {
        var str =
          'Error: ' +
          msg +
          '\nURL: ' +
          url +
          '\nLine: ' +
          lineNo +
          '\nColumn: ' +
          columnNo +
          '\nError object: ' +
          JSON.stringify(error) +
          '\nStack: ' +
          (error && error.stack);
        document.getElementById('error-log').innerText += '\n' + str;
        return false;
      };
      window.addEventListener('unhandledrejection', function (event) {
        document.getElementById('error-log').innerText +=
          '\nUnhandled promise rejection: ' + event.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
